version: '3.8'

services:
  nexus-cortex:
    build: ./backend
    container_name: nexus-cortex-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped